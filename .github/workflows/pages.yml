name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Render backend
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -n "$API_BASE_URL" ]; then
            perl -pi -e 's/(name="doodlehop-api-base" content=")[^"]*(")/$1'"$API_BASE_URL"'$2/' web/index.html
            echo "API base set to $API_BASE_URL"
          else
            echo "API_BASE_URL repo variable not set — add it under Settings → Secrets and variables → Actions"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
