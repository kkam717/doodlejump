services:
  - type: web
    name: doodlehop
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DOWNLOAD_MAC_URL
        value: https://github.com/kkam717/doodlejump/releases/download/v1.0.0/DoodleHopHop-1.0.0.dmg
      - key: DOWNLOAD_WIN_URL
        sync: false
